body:
  text: 宋于闐國三藏求那跋陀羅譯聞如是一時佛遊舍衛祇樹給孤獨精舍爾時佛告諸比丘我為汝說經比丘應唯然世尊願受教勅佛言人死有十二品何等十二一曰無餘死者謂羅漢無所著也二曰度於死者謂阿那含不復還也三曰有餘死者謂斯陀含往而還也四曰學度死者謂須陀洹見道迹也五曰無欺死者謂八等人也六曰歡喜死者謂行一心也七曰數數死者謂惡戒人也八曰悔死者謂凡夫也九曰橫死者謂孤獨苦也十曰縛著死者謂畜生也十一曰燒爛死者謂地獄也十二曰飢渴死者謂餓鬼也比丘當曉知是當作是學勿為放逸勿起婬色遠離諸橫以清淨心所未得證常令成就所以者何數數死為甚苦悔死亦苦橫死甚劇縛著死亦劇燒爛死甚痛飢渴死亦痛如是比丘當作是學習在閑居若處樹下學禪一心無得輕戲無得後悔是為佛教是佛法則佛說如是比丘歡喜稽首而退
